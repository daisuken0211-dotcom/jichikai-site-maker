            <section class="text-block"><h2>みどり町の目的</h2><p>地域の安心、安全、親睦を大切にしながら、住みよいまちづくりを進めるために活動しています。</p></section><section class="text-block"><h2>主な活動</h2><p>町内清掃、広報誌の配布、回覧板、行事運営など、日々の暮らしに必要な情報を地域の皆さまへお届けします。</p></section><section class="text-block"><h2>加入案内</h2><p>活動内容を知っていただいたうえで、地域の情報を受け取れる自治会への加入をご検討ください。詳しくは役員または問い合わせ窓口までご連絡ください。</p></section>
