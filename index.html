<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>自治会ホームページ ソースコード生成 試作品</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d8e0e7;
      --paper: #f7f5ef;
      --panel: #ffffff;
      --green: #2f7d57;
      --green-dark: #245f43;
      --gold: #c88a2d;
      --blue: #2f6f9f;
      --soft-green: #e8f3ed;
      --soft-blue: #e8f0f7;
      --soft-gold: #fbf2df;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", Meiryo, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.65;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 3;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 20px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(340px, 430px) minmax(0, 1fr);
      gap: 14px;
      width: min(1500px, calc(100% - 20px));
      margin: 14px auto 28px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(31, 41, 51, .08);
      overflow: hidden;
    }

    .editor-panel {
      position: sticky;
      top: 82px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 98px);
    }

    .editor-panel .panel-head {
      flex: 0 0 auto;
    }

    .editor-panel .form {
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      font-weight: 900;
    }

    .form {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      font-weight: 900;
      color: #334155;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 6px;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    .block-fields textarea {
      min-height: 40px;
      padding: 8px 10px;
      line-height: 1.45;
      overflow: hidden;
      resize: none;
    }

    .section-box {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .compact-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .theme-swatches {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .theme-swatch {
      width: 34px;
      height: 34px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: var(--swatch, #2f7d57);
      box-shadow: inset 0 0 0 4px #fff;
    }

    .theme-swatch.active {
      border-color: #111827;
    }

    .photo-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .photo-library {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      max-height: 260px;
      overflow: auto;
    }

    .photo-choice {
      display: grid;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px;
      background: #fff;
    }

    .photo-choice img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      background: #eef2f7;
    }

    .photo-choice-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #475569;
      font-size: 12px;
      font-weight: 800;
    }

    .photo-choice-meta {
      color: #64748b;
      font-size: 12px;
      line-height: 1.35;
    }

    .photo-slot-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .photo-slot-row button {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft-green);
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 900;
    }

    .page-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .page-tab {
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #334155;
      font-weight: 900;
      min-height: 36px;
      padding: 5px 12px;
    }

    .page-tab.active {
      border-color: var(--green);
      background: var(--soft-green);
      color: var(--green-dark);
    }

    .page-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .add-block-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .block-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .block-tab {
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #334155;
      font-weight: 900;
      min-height: 36px;
      padding: 4px 10px;
    }

    .block-tab.active {
      border-color: var(--green);
      background: var(--soft-green);
      color: var(--green-dark);
    }

    .block-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .block-panel-label {
      color: #475569;
      font-size: 13px;
      font-weight: 900;
    }

    .block-pick {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #334155;
      font-weight: 900;
      min-height: 36px;
      padding: 6px 12px;
      text-align: center;
    }

    .is-hidden {
      display: none !important;
    }

    .added-blocks {
      display: grid;
      gap: 8px;
    }

    .added-block-item {
      display: grid;
      gap: 8px;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      font-weight: 800;
    }

    .added-block-item.active {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 125, 87, .16);
      background: #fbfffd;
    }

    .notice-box.active {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 125, 87, .16);
      background: #fbfffd;
    }

    .added-block-title {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .block-tools {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .block-fields {
      display: grid;
      gap: 8px;
    }

    .block-edit-area,
    .block-layout-area {
      display: grid;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .block-layout-area {
      background: var(--soft-blue);
    }

    .block-area-title {
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 900;
    }

    .link-grid {
      display: grid;
      grid-template-columns: 1fr 1.25fr;
      gap: 6px;
    }

    .small-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      font-weight: 900;
      min-height: 36px;
      padding: 4px 10px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      min-height: 46px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #334155;
      font-weight: 900;
      padding: 8px 12px;
    }

    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .btn.secondary {
      border-color: #bfd3e5;
      background: var(--soft-blue);
      color: #244661;
    }

    .preview-wrap {
      background: #edf1f4;
      padding: 12px;
      overflow: auto;
    }

    .site-preview {
      width: min(100%, 980px);
      margin: 0 auto;
      background: #fff;
      border: 1px solid #cfd8e3;
      box-shadow: 0 12px 28px rgba(31, 41, 51, .10);
      position: relative;
      overflow: auto;
      max-height: 680px;
    }

    .site-preview header {
      background: var(--soft-green);
      border-bottom: 1px solid #c7dfd2;
      padding: 30px;
    }

    .site-preview.has-header-photo header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(rgba(232, 243, 237, .86), rgba(232, 243, 237, .9)), var(--header-photo), var(--soft-green);
      background-size: cover;
      background-position: var(--header-photo-position, center center);
    }

    .site-preview nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 22px;
      font-weight: 900;
      color: var(--green-dark);
    }

    .site-preview .site-nav {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 9px 14px;
      margin-top: 0;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 8px 18px rgba(31, 41, 51, .08);
    }

    .site-preview .site-nav a {
      border: 1px solid #c7dfd2;
      border-radius: 999px;
      color: var(--green-dark);
      background: var(--soft-green);
      padding: 4px 10px;
      text-decoration: none;
      font-weight: 900;
      font-size: 13px;
      white-space: nowrap;
    }

    .site-preview .site-nav a.active {
      color: #fff;
      background: var(--green);
    }

    .site-preview.nav-left {
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr);
      padding-left: 0;
    }

    .site-preview.nav-left .site-nav {
      position: sticky;
      top: 0;
      left: 0;
      grid-column: 1;
      grid-row: 1 / span 2;
      width: 126px;
      max-height: 680px;
      align-content: start;
      align-items: stretch;
      flex-direction: column;
      margin-top: 0;
      border-right: 1px solid var(--line);
      border-bottom: 0;
      overflow: auto;
    }

    .site-preview.nav-left .site-nav a {
      border-radius: 8px;
      text-align: center;
      white-space: normal;
    }

    .site-preview.nav-left header,
    .site-preview.nav-left main {
      grid-column: 2;
    }

    .site-preview h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1.2;
      color: #173d2b;
    }

    .site-preview .lead {
      margin: 10px 0 0;
      font-size: 18px;
      color: #334155;
    }

    .site-preview .page-title-label {
      display: inline-block;
      margin-top: 16px;
      color: #5b6b82;
      font-size: 18px;
      font-weight: 900;
    }

    .site-preview.has-header-photo .page-title-label {
      color: var(--green-dark);
      background: rgba(255, 255, 255, .78);
      border: 1px solid rgba(36, 95, 67, .18);
      border-radius: 999px;
      padding: 4px 12px;
    }

    .site-preview main {
      padding: 16px 30px 24px;
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .site-preview main > * {
      grid-column: 1 / -1;
    }

    .site-preview main > .block-half {
      grid-column: span 1;
    }

    .hero-photo {
      min-height: 220px;
      border-radius: 8px;
      background: linear-gradient(135deg, #dfe9e3, #e8f0f7);
      display: grid;
      place-items: center;
      color: #475569;
      font-weight: 900;
      overflow: hidden;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .template-note {
      display: inline-block;
      margin-top: 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #c7dfd2;
      color: var(--green-dark);
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 900;
    }

    .page-title-label {
      display: inline-block;
      margin-top: 10px;
      color: #64748b;
      font-weight: 900;
    }

    .feature-row {
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: 16px;
      align-items: stretch;
    }

    .feature-row.reverse {
      grid-template-columns: 1.1fr .9fr;
    }

    .feature-text {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fff;
    }

    .feature-text p {
      margin: 0;
      white-space: pre-wrap;
    }

    .text-block {
      display: grid;
      gap: 6px;
      padding: 2px 0;
      background: transparent;
    }

    .text-block h2 {
      margin: 0;
      border-left: 6px solid var(--green);
      padding-left: 10px;
      line-height: 1.35;
      font-size: clamp(20px, 2.8vw, 30px);
    }

    .site-preview.heading-line h2 {
      border-left: 0;
      border-bottom: 1px solid var(--line);
      color: var(--green-dark);
      padding: 8px 0;
      position: relative;
    }

    .site-preview.heading-line h2::before {
      content: "";
      display: block;
      height: 3px;
      margin-bottom: 8px;
      background: var(--green);
    }

    .site-preview.heading-band h2 {
      border-left: 0;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      padding: 8px 12px;
    }

    .text-block p {
      margin: 0;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .text-heading-only {
      padding: 0;
    }

    .text-block a,
    .feature-text a,
    .linked-photo {
      color: var(--green-dark);
      font-weight: 900;
    }

    .linked-photo {
      display: block;
      text-decoration: none;
    }

    .site-preview .is-editing-preview {
      outline: 4px solid rgba(47, 125, 87, .38);
      outline-offset: 5px;
      box-shadow: 0 0 0 8px rgba(47, 125, 87, .10);
      transition: outline-color .18s ease, box-shadow .18s ease;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .preview-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .preview-card h3 {
      margin: 0 0 8px;
      color: var(--green-dark);
    }

    .preview-card p {
      margin: 0;
      color: #475569;
    }

    .band {
      border-left: 6px solid var(--gold);
      background: var(--soft-gold);
      padding: 14px 16px;
      font-weight: 800;
    }

    .notice-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
    }

    .notice-table th,
    .notice-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    .notice-table th {
      width: 88px;
      color: var(--green-dark);
      background: #f1f5f3;
    }

    .photo-gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .photo-gallery.count-1 {
      grid-template-columns: 1fr;
    }

    .photo-gallery.count-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .photo-gallery .hero-photo {
      min-height: 210px;
    }

    .join-panel {
      border: 2px solid var(--gold);
      border-radius: 8px;
      background: var(--soft-gold);
      padding: 18px;
    }

    .alert-panel {
      border: 2px solid #9fc2dc;
      border-radius: 8px;
      background: #e8f0f7;
      padding: 18px;
    }

    .archive-link {
      display: inline-block;
      border: 2px solid var(--green);
      border-radius: 8px;
      color: var(--green-dark);
      background: var(--soft-green);
      padding: 8px 14px;
      text-decoration: none;
      font-weight: 900;
    }

    .link-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, auto));
      justify-content: start;
      gap: 8px;
      margin-top: 10px;
    }

    .placeholder-link {
      opacity: .62;
    }

    .extra-divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-weight: 900;
    }

    .extra-divider::before,
    .extra-divider::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .site-preview.t-photo-hero header {
      color: #fff;
      background: linear-gradient(rgba(31,41,51,.35), rgba(31,41,51,.48)), var(--preview-photo), #2f7d57;
      background-size: cover;
      background-position: center;
      min-height: 360px;
      display: grid;
      align-content: center;
    }

    .site-preview.t-photo-hero header h1,
    .site-preview.t-photo-hero header .lead,
    .site-preview.t-photo-hero header nav {
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,.25);
    }

    .site-preview.t-compact main {
      gap: 12px;
      padding: 18px 22px 24px;
    }

    .site-preview.t-compact .hero-photo {
      min-height: 140px;
    }

    .site-preview.t-blank:not(.has-header-photo) header {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .site-preview.t-blank main {
      min-height: 80px;
    }

    .site-preview.t-magazine h2 {
      border-left: 0;
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      text-align: center;
      position: relative;
    }

    .site-preview.t-magazine h2::before {
      content: "";
      display: block;
      height: 3px;
      margin-bottom: 8px;
      background: var(--green);
    }

    .site-preview.heading-simple h2 {
      border-top: 0;
      border-right: 0;
      border-bottom: 0;
      border-left: 6px solid var(--green);
      color: inherit;
      background: transparent;
      padding: 0 0 0 10px;
      text-align: left;
    }

    .site-preview.heading-line h2 {
      text-align: left;
    }

    .site-preview.heading-band h2 {
      border: 0;
      text-align: left;
    }

    .code-panel {
      margin-top: 14px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    .tab {
      border: 2px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 7px 12px;
      font-weight: 900;
    }

    .tab.active {
      border-color: var(--green);
      background: var(--soft-green);
      color: var(--green-dark);
    }

    pre {
      margin: 0;
      max-height: 360px;
      overflow: auto;
      padding: 14px;
      background: #111827;
      color: #e5e7eb;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      color: var(--muted);
      font-weight: 800;
    }

    .auth-summary {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      color: #475569;
      font-weight: 800;
    }

    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .auth-note {
      border-left: 5px solid var(--blue);
      background: var(--soft-blue);
      padding: 10px 12px;
      color: #244661;
      font-weight: 800;
    }

    .auth-preview {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .login-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .login-card h3 {
      margin: 0 0 8px;
      color: var(--green-dark);
    }

    .admin-list {
      display: grid;
      gap: 7px;
    }

    .admin-user {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function formatBytes(bytes) {
      if (!bytes) return "0KB";
      if (bytes >= 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(1)}MB`;
      return `${Math.max(1, Math.round(bytes / 1024))}KB`;
    }

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("写真を読み込めませんでした"));
        };
        image.src = url;
      });
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve) => {
        if (canvas.toBlob) {
          canvas.toBlob((blob) => resolve(blob), type, quality);
          return;
        }
        const dataUrl = canvas.toDataURL(type, quality);
        resolve(dataUrlToBytes(dataUrl));
      });
    }

    async function compressImageForHomepage(file) {
      const image = await loadImageFromFile(file);
      const maxSide = 1600;
      const scale = Math.min(1, maxSide / Math.max(image.naturalWidth || image.width, image.naturalHeight || image.height));
      const width = Math.max(1, Math.round((image.naturalWidth || image.width) * scale));
      const height = Math.max(1, Math.round((image.naturalHeight || image.height) * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d", { alpha: false });
      context.fillStyle = "#ffffff";
      context.fillRect(0, 0, width, height);
      context.drawImage(image, 0, 0, width, height);
      const blob = await canvasToBlob(canvas, "image/jpeg", 0.78);
      const compressedBlob = blob instanceof Blob ? blob : new Blob([blob.bytes], { type: blob.mime || "image/jpeg" });
      const dataUrl = await readFileAsDataUrl(compressedBlob);
      return {
        dataUrl,
        originalSize: file.size,
        compressedSize: compressedBlob.size,
        width,
        height,
        savedRatio: file.size ? Math.max(0, Math.round((1 - compressedBlob.size / file.size) * 100)) : 0
      };
    }

    function renderPhotoLibrary() {
      if (!state.localPhotos.length) {
        els.photoLibrary.innerHTML = `<div class="status">フォルダーを選ぶと写真がここに並びます</div>`;
        return;

      els.photoLibrary.innerHTML = state.localPhotos.map((photo, index) => `

          <div class="photo-choice-name">${escapeHtml(photo.name)}</div>
          <div class="photo-choice-meta">${formatBytes(photo.originalSize)} → ${formatBytes(photo.compressedSize)} / ${photo.width}×${photo.height}</div>
          <div class="photo-slot-row">
            <button type="button" data-use-header-photo="${index}">帯写真</button>
            <button type="button" data-use-local-photo="${index}:0">写真1</button>
            <button type="button" data-use-local-photo="${index}:1">写真2</button>
            <button type="button" data-use-local-photo="${index}:2">写真3</button>

    async function loadLocalPhotoFiles(fileList) {
      const files = Array.from(fileList || [])
        .filter((file) => file.type.startsWith("image/"))
        .slice(0, 80);
      if (!files.length) {
        els.status.textContent = "画像ファイルが見つかりませんでした";
        return;
      }
      els.status.textContent = "写真を読み込んでいます";
      state.localPhotos = await Promise.all(files.map(async (file) => ({
        name: file.webkitRelativePath || file.name,
        ...(await compressImageForHomepage(file).catch(async () => {
          const dataUrl = await readFileAsDataUrl(file);
          return {
            dataUrl,
            originalSize: file.size,
            compressedSize: file.size,
            width: 0,
            height: 0,
            savedRatio: 0
          };
        }))
      })));
      renderPhotoLibrary();
      const originalTotal = state.localPhotos.reduce((sum, photo) => sum + photo.originalSize, 0);
      const compressedTotal = state.localPhotos.reduce((sum, photo) => sum + photo.compressedSize, 0);
      const savedRatio = originalTotal ? Math.max(0, Math.round((1 - compressedTotal / originalTotal) * 100)) : 0;
      els.status.textContent = `${state.localPhotos.length}枚の写真をHP用に軽くしました（${formatBytes(originalTotal)} → ${formatBytes(compressedTotal)} / 約${savedRatio}%削減）`;
    }

    function isDataImageUrl(url) {

    function imageExtensionFromMime(mime) {
      if (mime.includes("png")) return "png";
      if (mime.includes("webp")) return "webp";
      if (mime.includes("gif")) return "gif";
      return "jpg";
    }

    function dataUrlToBytes(dataUrl) {
      const match = /^data:(image\/[a-zA-Z0-9.+-]+);base64,(.*)$/.exec(dataUrl);
      if (!match) return null;
      const binary = atob(match[2]);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return {
        mime: match[1],
        bytes
      };
    }

    function disasterMarkup() {
      return `<section class="alert-panel"><h2>防災・重要情報</h2><p>災害時の集合場所、避難情報、安否確認の方法をこの欄に掲載できます。</p></section>`;
    }

    function aboutMarkup(catchText) {
      return `<section class="feature-text"><h2>自治会について</h2><p>${catchText}</p></section>`;
    }

    function customHeadingText(block = null) {
      return {
        heading: escapeHtml((block ? block.heading : els.customHeading.value).trim() || "新しい見出し"),
        text: escapeHtml((block ? block.text : els.customText.value).trim() || "ここに本文を入れます。")
      };
    }

    function blankHeadingMarkup() {
      const custom = customHeadingText();
      return `<section class="text-block"><h2>${custom.heading}</h2><p>${custom.text}</p></section>`;
    }

    function headingOnlyMarkup(block) {
      const custom = customHeadingText(block);
      return `<section class="${blockClass(block, "text-block text-heading-only")}"${previewBlockAttr(block)}><h2>${custom.heading}</h2>${textLinkMarkup(block)}</section>`;
    }

    function textOnlyMarkup(block) {
      const custom = customHeadingText(block);
      return `<section class="${blockClass(block, "text-block text-only")}"${previewBlockAttr(block)}><p>${custom.text}</p>${textLinkMarkup(block)}</section>`;
    }

    function headingTextMarkup(block) {
      const custom = customHeadingText(block);
      return `<section class="${blockClass(block, "text-block")}"${previewBlockAttr(block)}><h2>${custom.heading}</h2><p>${custom.text}</p>${textLinkMarkup(block)}</section>`;
    }

    function recentInfoMarkup(context) {
      return `
        <section>
          <h2>直近のお知らせ</h2>
          <table class="notice-table">
            ${context.notices.map((notice, index) => `
              <tr>
                <th>${index + 1}</th>
                <td><strong>${escapeHtml(notice.title || "お知らせ")}</strong><br>${escapeHtml(notice.body)}</td>
              </tr>
            `).join("")}
          </table>
        </section>
      `;
    }

    function newsletterMarkup() {
      return `<section class="feature-text"><h2>広報誌</h2><p>最新号と直近1年分の広報誌を掲載できます。PDFへのリンクや画像を並べる形にもできます。</p></section>`;
    }

    function linkButtonsMarkup(block, className = "") {
      const links = (block.links || []).filter((link) => link.text.trim() || link.url.trim()).slice(0, 3);
      if (!links.length) return `<span class="archive-link placeholder-link">リンクを設定してください</span>`;
      return `<div class="link-buttons ${className}">
        ${links.map((link) => {
          const text = escapeHtml(link.text.trim() || "PDFを見る");
          const url = escapeHtml(link.url.trim());
          return url
            ? `<a class="archive-link" href="${url}" target="_blank" rel="noopener">${text}</a>`
            : `<span class="archive-link placeholder-link">${text}</span>`;
        }).join("")}
      </div>`;
    }

    function linksBlockMarkup(block) {
      const custom = customHeadingText(block);
      return `<section class="${blockClass(block, "feature-text")}"${previewBlockAttr(block)}><h2>${custom.heading}</h2><p>${custom.text}</p>${linkButtonsMarkup(block)}</section>`;
    }

    function photoTextMarkup(photoUrls, siteName, block, reverse = false) {
      const custom = customHeadingText(block);
      const photo = photoMarkup(photoUrls, siteName);
      const text = `<div class="feature-text"><h2>${custom.heading}</h2><p>${custom.text}</p></div>`;
      return `<section class="${blockClass(block, `feature-row ${reverse ? "reverse" : ""}`)}"${previewBlockAttr(block)}>${reverse ? `${text}${wrapPhotoLink(photo, block)}` : `${wrapPhotoLink(photo, block)}${text}`}</section>`;
    }

    function extraBlockMarkup(block, context) {
      const blockType = block.type;
      if (blockType === "headingOnly") return headingOnlyMarkup(block);
      if (blockType === "textOnly") return textOnlyMarkup(block);
      if (blockType === "headingText") return headingTextMarkup(block);
      if (blockType === "pdfLinks" || blockType === "buttonLinks") return linksBlockMarkup(block);
      if (blockType === "photo") return wrapPhotoLink(`<section class="${blockClass(block)}"${previewBlockAttr(block)}>${context.photoBlock}</section>`, block);
      if (blockType === "photoTextLeft") return photoTextMarkup(context.photoUrls, context.siteName, block, false);
      if (blockType === "textPhotoRight") return photoTextMarkup(context.photoUrls, context.siteName, block, true);
      if (blockType === "blankHeading") return blankHeadingMarkup();
      if (blockType === "recentInfo") return recentInfoMarkup(context);
      if (blockType === "newsCards") return context.noticeCards;
      if (blockType === "newsTable") return context.noticeTable;
      if (blockType === "schedule") return scheduleMarkup();
      if (blockType === "contact") return contactMarkup();
      return "";
    }

    function extraBlocksMarkup(context) {
      if (!state.extraBlocks.length) return "";
      if (context.templateId === "blank") {
        return state.extraBlocks.map((block) => extraBlockMarkup(block, context)).join("");
      }
      return `
        <div class="extra-divider">追加ブロック</div>
        ${state.extraBlocks.map((block) => extraBlockMarkup(block, context)).join("")}
      `;
    }

    function renderAddedBlocks() {
      els.addedBlocks.innerHTML = state.extraBlocks.length
        ? state.extraBlocks.map((block, index) => {
            const type = extraBlockTypes.find((item) => item.id === block.type);
            const needsHeading = ["headingOnly", "headingText", "photoTextLeft", "textPhotoRight", "pdfLinks", "buttonLinks"].includes(block.type);
            const needsText = ["textOnly", "headingText", "photoTextLeft", "textPhotoRight", "pdfLinks", "buttonLinks"].includes(block.type);
            const needsLinks = ["pdfLinks", "buttonLinks"].includes(block.type);
            const needsTextLink = ["headingOnly", "textOnly", "headingText", "photoTextLeft", "textPhotoRight"].includes(block.type);
            const needsPhotoLink = ["photo", "photoTextLeft", "textPhotoRight"].includes(block.type);
            const isActive = block.id === state.activeBlockId;
            return `
              <div class="added-block-item ${isActive ? "active" : ""}" data-added-block-id="${escapeHtml(block.id)}">
                <div class="added-block-title">
                  <span>${index + 1}. ${escapeHtml(type ? type.name : block.type)}</span>
                  <div class="block-tools">
                    <button class="small-btn" type="button" data-move-block="${index}:up">上へ</button>
                    <button class="small-btn" type="button" data-move-block="${index}:down">下へ</button>
                    <button class="small-btn" type="button" data-remove-block="${index}">削除</button>
                  </div>
                </div>
                <div class="block-fields">
                  <div class="block-edit-area">
                    <div class="block-area-title">内容</div>
                    ${needsHeading ? `<input data-block-field="${index}:heading" value="${escapeHtml(block.heading)}" placeholder="見出し">` : ""}
                    ${needsText ? `<textarea rows="1" data-block-field="${index}:text" placeholder="本文">${escapeHtml(block.text)}</textarea>` : ""}
                    ${needsTextLink ? `
                      <div class="link-grid">
                        <input data-block-field="${index}:textLinkText" value="${escapeHtml(block.textLinkText || "")}" placeholder="文字リンクの表示名">
                        <input data-block-field="${index}:textLinkUrl" value="${escapeHtml(block.textLinkUrl || "")}" placeholder="文字リンクURL">
                      </div>
                    ` : ""}
                    ${needsPhotoLink ? `<input data-block-field="${index}:photoLinkUrl" value="${escapeHtml(block.photoLinkUrl || "")}" placeholder="写真を押した時のリンクURL">` : ""}
                    ${needsLinks ? (block.links || []).slice(0, 3).map((link, linkIndex) => `
                      <div class="link-grid">
                        <input data-block-field="${index}:links.${linkIndex}.text" value="${escapeHtml(link.text)}" placeholder="リンク文字 ${linkIndex + 1}">
                        <input data-block-field="${index}:links.${linkIndex}.url" value="${escapeHtml(link.url)}" placeholder="PDFまたはリンクURL ${linkIndex + 1}">
                      </div>
                    `).join("") : ""}
                  </div>
                  <div class="block-layout-area">
                    <div class="block-area-title">配置</div>
                    <select data-block-field="${index}:width">
                      <option value="full" ${block.width !== "half" ? "selected" : ""}>横幅いっぱい</option>
                      <option value="half" ${block.width === "half" ? "selected" : ""}>半分の幅で横並び</option>
                    </select>
                  </div>
                </div>
              </div>
            `;
          }).join("")
        : `<div class="status">まだ追加ブロックはありません</div>`;
      autoResizeBlockTextareas();
    }

    function autoResizeBlockTextareas() {
      els.addedBlocks.querySelectorAll("textarea").forEach((textarea) => {
        textarea.style.height = "auto";
        textarea.style.height = `${Math.max(40, textarea.scrollHeight)}px`;
      });
    }

    function buildPreviewHtml() {
      const siteName = escapeHtml(els.siteName.value || "自治会");
      const catchText = escapeHtml(els.catchText.value);
      const hero = activeHeroContent(state.currentPageIndex);
      const heroTitle = escapeHtml(hero.title || els.pageTitle.value || "ホーム");
      const heroLead = escapeHtml(hero.lead || "");
      const heroPageLabel = escapeHtml(hero.pageLabel || "");
      const photoUrls = collectPhotoUrls();
      const notices = collectNotices();
      const template = currentTemplate();
      const noticeBlock = template.id === "tableNews" ? noticesTableMarkup(notices) : noticesCardsMarkup(notices);
      const noticeCards = noticesCardsMarkup(notices);
      const noticeTable = noticesTableMarkup(notices);
      const photoBlock = photoMarkup(photoUrls, siteName);
      const context = { siteName, catchText, photoUrls, photoBlock, noticeCards, noticeTable, notices, templateId: template.id };
      let bodyBlocks = "";

      if (template.id === "photoLeft" || template.id === "photoRight") {
        bodyBlocks = `
          <section class="feature-row ${template.id === "photoRight" ? "reverse" : ""}">
            ${template.id === "photoRight" ? `<div class="feature-text"><h2>自治会について</h2><p>${catchText}</p></div>${photoBlock}` : `${photoBlock}<div class="feature-text"><h2>自治会について</h2><p>${catchText}</p></div>`}
          </section>
          ${noticeBlock}
          ${scheduleMarkup()}
          ${contactMarkup()}
        `;
      } else if (template.id === "newsFirst") {
        bodyBlocks = `${noticeBlock}${photoBlock}${scheduleMarkup()}${contactMarkup()}`;
      } else if (template.id === "scheduleFirst") {
        bodyBlocks = `${scheduleMarkup()}${noticeBlock}${photoBlock}${contactMarkup()}`;
      } else if (template.id === "joinFocus") {
        bodyBlocks = `${joinMarkup()}${photoBlock}${noticeBlock}${scheduleMarkup()}${contactMarkup()}`;
      } else if (template.id === "disaster") {
        bodyBlocks = `${disasterMarkup()}${noticeBlock}${scheduleMarkup()}${photoBlock}${contactMarkup()}`;
      } else if (template.id === "compact") {
        bodyBlocks = `${noticeBlock}${scheduleMarkup()}${contactMarkup()}`;
      } else if (template.id === "blank") {
        bodyBlocks = "";
      } else {
        bodyBlocks = `${photoBlock}${noticeBlock}${scheduleMarkup()}${contactMarkup()}`;
      }

      if (template.id === "blank") {
        return `
          ${pageNavMarkup()}
          <header>
            <h1>${heroTitle}</h1>
            ${heroLead ? `<p class="lead">${heroLead}</p>` : ""}
            ${heroPageLabel ? `<span class="page-title-label">${heroPageLabel}</span>` : ""}
          </header>
          <main>
            ${extraBlocksMarkup(context)}
          </main>
        `;
      }

      return `
        ${pageNavMarkup()}
        <header>
          <h1>${heroTitle}</h1>
          ${heroLead ? `<p class="lead">${heroLead}</p>` : ""}
          ${heroPageLabel ? `<span class="page-title-label">${heroPageLabel}</span>` : ""}
        </header>
        <main>
          ${bodyBlocks}
          ${extraBlocksMarkup(context)}
        </main>
      `;
    }

    function buildExportHtml() {
      const title = escapeHtml(`${activeDocumentSiteName(state.currentPageIndex)} - ${els.pageTitle.value || "ホーム"}`);
      const template = currentTemplate();
      const hasHeaderPhoto = activeHeaderPhotoEnabled(state.currentPageIndex);
      const photoUrl = escapeHtml(primaryPhotoUrl() || placeholderPhoto());
      const headerUrl = escapeHtml(activeHeaderPhotoUrl(state.currentPageIndex) || placeholderPhoto());
      const headerPosition = escapeHtml(headerPhotoPosition());
      const navClass = els.navPosition.value === "left" ? "nav-left" : "nav-top";
      const headingClass = `heading-${currentHeadingStyle()}`;
      const headerPhotoClass = hasHeaderPhoto ? "has-header-photo" : "";
      return `<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${title}</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="${template.className} ${navClass} ${headingClass} ${headerPhotoClass}" style="--preview-photo: url('${photoUrl}'); --header-photo: url('${headerUrl}'); --header-photo-position: ${headerPosition};">
${buildPreviewHtml()}
</body>
</html>`;
    }

    function sakumaFarmCreditHtml() {
      return `<footer id="sakuma-farm-credit" style="margin:32px auto 0;padding:14px 16px;border-top:1px solid #d8e0e7;text-align:center;color:#64748b;font:14px/1.6 -apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,sans-serif;background:#f8fafc;">

</footer>
<script>
(function(){
  var credit = '<footer id="sakuma-farm-credit" style="margin:32px auto 0;padding:14px 16px;border-top:1px solid #d8e0e7;text-align:center;color:#64748b;font:14px/1.6 -apple-system,BlinkMacSystemFont,\\'Hiragino Sans\\',\\'Yu Gothic\\',Meiryo,sans-serif;background:#f8fafc;">Created by Sakuma Farm | <a href="https://daisuken0211-dotcom.github.io/jichikai-site-maker/" target="_blank" rel="noopener" style="color:#245f43;font-weight:700;text-decoration:underline;">自治会ホームページ作成ツール</a></footer>';
  function ensureCredit(){

      document.body.insertAdjacentHTML('beforeend', credit);
    }

  ensureCredit();
  setInterval(ensureCredit, 2000);
})();
<\/script>`;
    }

    function buildFirestoreRules() {
      return `rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function signedIn() {
      return request.auth != null;
    }

    function isOwner(userId) {
      return signedIn() && request.auth.uid == userId;
    }

    match /users/{userId} {
      allow read, write: if isOwner(userId);
    }

    match /sites/{siteId} {
      allow create: if signedIn() && request.resource.data.ownerUid == request.auth.uid;
      allow read, update, delete: if signedIn() && resource.data.ownerUid == request.auth.uid;
    }
  }
}
`;

    function buildAuthAppJs() {
      const config = firebaseConfig();
      return `import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  updateProfile,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = ${JSON.stringify(config, null, 2)};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const statusEl = document.querySelector("[data-auth-status]");
const registerForm = document.querySelector("[data-register-form]");
const loginForm = document.querySelector("[data-login-form]");
const logoutBtn = document.querySelector("[data-logout]");

function setStatus(message) {
  if (statusEl) statusEl.textContent = message;
}

registerForm?.addEventListener("submit", async (event) => {
  event.preventDefault();
  const form = new FormData(registerForm);
  const name = String(form.get("name") || "").trim();
  const email = String(form.get("email") || "").trim();
  const password = String(form.get("password") || "");

  const result = await createUserWithEmailAndPassword(auth, email, password);
  await updateProfile(result.user, { displayName: name });
  await setDoc(doc(db, "users", result.user.uid), {
    name,
    email,
    role: "user",
    createdAt: serverTimestamp()
  });
  await sendEmailVerification(result.user);
  setStatus("確認メールを送りました。メール内のリンクを押してからログインしてください。");
});

loginForm?.addEventListener("submit", async (event) => {
  event.preventDefault();
  const form = new FormData(loginForm);
  await signInWithEmailAndPassword(auth, String(form.get("email") || ""), String(form.get("password") || ""));
});

logoutBtn?.addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, (user) => {
  if (!user) {
    document.body.dataset.login = "guest";
    setStatus("ログインしていません");
    return;
  }
  document.body.dataset.login = "user";
  setStatus(user.emailVerified ? "ログイン中" : "メール確認がまだ終わっていません");
});
`;
    }

      return `{

    function buildFunctionsIndexJs() {
      return `const admin = require("firebase-admin");
const { onCall, HttpsError } = require("firebase-functions/v2/https");

admin.initializeApp();

function assertAdmin(request) {
  const adminPassword = process.env.ADMIN_PASSWORD || "CHANGE_THIS_ADMIN_PASSWORD";
  if (request.data.adminPassword !== adminPassword) {
    throw new HttpsError("permission-denied", "管理者だけが削除できます。");
  }
}

exports.listUsersByAdmin = onCall(async (request) => {
  assertAdmin(request);
  const result = await admin.auth().listUsers(1000);
  return {
    users: result.users.map((user) => ({
      uid: user.uid,
      email: user.email || "",
      displayName: user.displayName || "",
      disabled: user.disabled
    }))
  };
});

exports.deleteUserByAdmin = onCall(async (request) => {
  assertAdmin(request);

  const uid = String(request.data.uid || "");
  if (!uid) {
    throw new HttpsError("invalid-argument", "削除する利用者IDが必要です。");
  }

  await admin.auth().deleteUser(uid);
  await admin.firestore().collection("users").doc(uid).delete();
  return { ok: true };
});
`;
    }

    function crc32(bytes) {
      let crc = -1;
      for (let i = 0; i < bytes.length; i += 1) {
        crc ^= bytes[i];
        for (let bit = 0; bit < 8; bit += 1) {
          crc = (crc >>> 1) ^ (0xedb88320 & -(crc & 1));
        }
      }
      return (crc ^ -1) >>> 0;
    }

    function u16(value) {
      return [value & 255, (value >>> 8) & 255];
    }

    function u32(value) {
      return [value & 255, (value >>> 8) & 255, (value >>> 16) & 255, (value >>> 24) & 255];
    }

    function dosTimeDate(date = new Date()) {
      const time = (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2);
      const day = Math.max(1, date.getDate());
      const month = date.getMonth() + 1;
      const year = Math.max(1980, date.getFullYear()) - 1980;
      return { time, date: (year << 9) | (month << 5) | day };
    }

    function makeZip(files) {
      const encoder = new TextEncoder();
      const chunks = [];
      const central = [];
      let offset = 0;
      const stamp = dosTimeDate();

      files.forEach((file) => {
        const nameBytes = encoder.encode(file.name);
        const data = file.bytes instanceof Uint8Array ? file.bytes : encoder.encode(file.content || "");
        const crc = crc32(data);
        const localHeader = new Uint8Array([
          ...u32(0x04034b50), ...u16(20), ...u16(0), ...u16(0), ...u16(stamp.time), ...u16(stamp.date),
          ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(nameBytes.length), ...u16(0)
        ]);
        chunks.push(localHeader, nameBytes, data);

        const centralHeader = new Uint8Array([
          ...u32(0x02014b50), ...u16(20), ...u16(20), ...u16(0), ...u16(0), ...u16(stamp.time), ...u16(stamp.date),
          ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(nameBytes.length), ...u16(0), ...u16(0),
          ...u16(0), ...u16(0), ...u32(0), ...u32(offset)
        ]);
        central.push(centralHeader, nameBytes);
        offset += localHeader.length + nameBytes.length + data.length;
      });

      const centralSize = central.reduce((sum, chunk) => sum + chunk.length, 0);
      const end = new Uint8Array([
        ...u32(0x06054b50), ...u16(0), ...u16(0), ...u16(files.length), ...u16(files.length),
        ...u32(centralSize), ...u32(offset), ...u16(0)
      ]);

      return new Blob([...chunks, ...central, end], { type: "application/zip" });
    }

    function collectProjectImageAssets() {
      saveCurrentPage();
      const map = new Map();
      const files = [];
      state.pages.forEach((page) => {
        const headerUrl = page.headerPhotoUrl || "";
        if (isDataImageUrl(headerUrl) && !map.has(headerUrl)) {
          const image = dataUrlToBytes(headerUrl);
          if (image) {
            const ext = imageExtensionFromMime(image.mime);
            const name = `images/header-${files.length + 1}.${ext}`;
            map.set(headerUrl, name);
            files.push({ name, bytes: image.bytes });
          }
        }
        (page.photoUrls || []).forEach((url) => {
          if (!isDataImageUrl(url) || map.has(url)) return;
          const image = dataUrlToBytes(url);
          if (!image) return;
          const ext = imageExtensionFromMime(image.mime);
          const name = `images/photo-${files.length + 1}.${ext}`;
          map.set(url, name);
          files.push({ name, bytes: image.bytes });
        });
      });
      return { map, files };
    }

    function replacePageDataImageUrls(page, imageMap) {
      return {
        ...page,
        headerPhotoUrl: imageMap.get(page.headerPhotoUrl || "") || page.headerPhotoUrl || "",
        photoUrls: (page.photoUrls || ["", "", ""]).map((url) => imageMap.get(url) || url)
      };
    }

    function replaceContentImageUrls(content, imageMap) {
      let output = content || "";
      imageMap.forEach((fileName, dataUrl) => {
        output = output.split(dataUrl).join(fileName);
      });
      return output;
    }

        imageMap: imageAssets.map
      };

    function accessStorageKey() {
      return "sakumaFarmHomepageAccess";
    }

    function endOfYear(year) {
      return new Date(year, 11, 31, 23, 59, 59).getTime();
    }

    function endOfMonth(year, monthIndex) {
      return new Date(year, monthIndex + 1, 0, 23, 59, 59).getTime();
    }

    function validAccessCodes() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      return [
        { code: `SAKUMA-${year}`, type: "yearly", expiresAt: endOfYear(year) },
        { code: `SAKUMA-${year}${month}`, type: "monthly", expiresAt: endOfMonth(year, now.getMonth()) },
        { code: "SAKUMA-FREE", type: "free", expiresAt: endOfYear(year) }
      ];
    }

    function licensedAccess() {
      try {
        const data = JSON.parse(localStorage.getItem(accessStorageKey()) || "null");
        return data && data.expiresAt && data.expiresAt > Date.now() ? data : null;
      } catch {
        return null;
      }
    }

    function verifyAccessCode(code) {
      const normalized = String(code || "").trim().toUpperCase();
      return validAccessCodes().find((item) => item.code === normalized) || null;
    }

    async function verifyAccessCodeOnServer(code) {
      if (!accessCodeConfig.apiUrl) return verifyAccessCode(code);
      const response = await fetch(accessCodeConfig.apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          code: String(code || "").trim(),
          appId: accessCodeConfig.appId
        })
      });
      if (!response.ok) throw new Error("利用コードを確認できませんでした");
      const result = await response.json();
      if (!result || !result.ok) return null;
      return {
        type: result.type || "server",
        expiresAt: result.expiresAt ? new Date(result.expiresAt).getTime() : endOfYear(new Date().getFullYear())
      };
    }

    function saveLicensedAccess(access) {
      localStorage.setItem(accessStorageKey(), JSON.stringify({
        type: access.type,
        expiresAt: access.expiresAt,
        checkedAt: Date.now()
      }));
    }

    async function exportModeOrCancel() {
      if (licensedAccess()) return "licensed";
      const code = prompt("利用コードを入力してください。\n\nコードがない場合は、空欄のままOKを押すと「Created by Sakuma Farm」入りで保存できます。");
      if (code === null) return null;
      if (!code.trim()) return "branded";
      let access = null;
      try {
        access = await verifyAccessCodeOnServer(code);
      } catch (error) {
        alert("利用コードの確認サーバーに接続できませんでした。時間をおいて再度お試しください。");
        return null;
      }
      if (!access) {
        alert("利用コードが違います。もう一度お試しください。コードなしで保存する場合は空欄のままOKを押してください。");
        return null;
      }
      saveLicensedAccess(access);
      els.status.textContent = "利用コードを確認しました。次回からこのPCでは入力不要です";
      return "licensed";
    }

      state.localPhotos = [];
      renderPhotoLibrary();
      els.status.textContent = "写真一覧をクリアしました";
    });
    els.photoFolderInput.addEventListener("change", async () => {
      await loadLocalPhotoFiles(els.photoFolderInput.files);
      els.photoFolderInput.value = "";
    });
    els.photoLibrary.addEventListener("click", (event) => {
      const headerButton = event.target.closest("[data-use-header-photo]");
      if (headerButton) {
        const photo = state.localPhotos[Number(headerButton.dataset.useHeaderPhoto)];
        if (!photo) return;
        setHeaderPhoto(photo.dataUrl);
        els.status.textContent = "帯写真に写真を入れました";
        return;
      }
      const button = event.target.closest("[data-use-local-photo]");
      if (!button) return;
      const [photoIndexText, slotIndexText] = button.dataset.useLocalPhoto.split(":");
      const photo = state.localPhotos[Number(photoIndexText)];
      if (!photo) return;
      setPhotoSlot(Number(slotIndexText), photo.dataUrl);
      els.status.textContent = `${button.textContent}に写真を入れました`;
    });
    document.getElementById("sampleBtn").addEventListener("click", () => {
      els.siteName.value = "さくら台自治会";
      els.catchText.value = "地域の行事、防災、回覧板のお知らせをまとめて掲載しています。";
      els.headerPhotoUrl.value = "";
      els.headerPhotoEnabled.checked = false;
      els.photoUrl1.value = "";
      els.photoUrl2.value = "";
      els.photoUrl3.value = "";
      els.customHeading.value = "自治会の活動紹介";
      els.customText.value = "清掃活動、防災訓練、季節の行事などを通じて、安心して暮らせる地域づくりを進めています。";
      els.scheduleText.value = "7月20日: 町内清掃 / 8月3日: 夏祭り / 9月1日: 防災訓練";
      els.contactText.value = "ご不明点は各班長、または自治会役員までご連絡ください。";
      state.extraBlocks = [
        { ...defaultBlock("headingText"), heading: "自治会の活動紹介", text: "清掃活動、防災訓練、季節の行事などを通じて、安心して暮らせる地域づくりを進めています。" },
        { ...defaultBlock("pdfLinks"), heading: "回覧板", text: "直近の回覧板をPDFで確認できます。", links: [
          { text: "最新の回覧板PDFを見る", url: "https://example.com/kairan.pdf" },
          { text: "", url: "" },
          { text: "", url: "" }
        ] }
      ];
      render();
    });

    document.getElementById("standardSetBtn").addEventListener("click", () => {
      const siteName = els.siteName.value.trim() || "大森自治会";
      const message = "自治会HP標準セットを入れます。現在の作成内容は標準セットに置き換わります。よろしいですか？";
      if (!confirm(message)) return;
      loadProjectData(createStandardJichikaiProject(siteName));
      els.status.textContent = "自治会HP標準セットを入れました。不要なページやブロックは削除できます。";
    });

    els.pageTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-page-index]");
      if (!button) return;
      saveCurrentPage();
      state.currentPageIndex = Number(button.dataset.pageIndex);
      applyPageData(state.pages[state.currentPageIndex]);
      render();
    });

    els.addPageBtn.addEventListener("click", () => {
      saveCurrentPage();
      const page = defaultPage(state.pages.length, els.siteName.value || "みどり町自治会");
      state.pages.push(page);
      state.currentPageIndex = state.pages.length - 1;
      applyPageData(page);
      render();
    });

    els.deletePageBtn.addEventListener("click", () => {
      if (state.pages.length <= 1) return;
      state.pages.splice(state.currentPageIndex, 1);
      state.currentPageIndex = Math.max(0, state.currentPageIndex - 1);
      applyPageData(state.pages[state.currentPageIndex]);
      render();
    });

    function scrollActiveBlockIntoView() {
      const item = els.addedBlocks.querySelector(`[data-added-block-id="${CSS.escape(state.activeBlockId)}"]`);
      if (item) item.scrollIntoView({ block: "center", behavior: "smooth" });
    }

    function updateNoticeSelection() {
      optionalEls.noticeBoxes.forEach((box, index) => {
        box.classList.toggle("active", index === state.activeNoticeIndex);
      });
    }

    function activateNotice(index) {
      state.activeBlockId = "";
      state.activeNoticeIndex = Math.min(Math.max(Number(index) || 0, 0), 2);
      renderAddedBlocks();
      render(true);
      updateNoticeSelection();
      optionalEls.noticeBoxes[state.activeNoticeIndex]?.scrollIntoView({ block: "center", behavior: "smooth" });
      els.status.textContent = `お知らせ${state.activeNoticeIndex + 1}を左で編集できます`;
    }

    els.preview.addEventListener("click", (event) => {
      const previewNotice = event.target.closest("[data-preview-target='notice']");
      if (previewNotice) {
        event.preventDefault();
        activateNotice(previewNotice.dataset.previewNoticeIndex || 0);
        return;
      }

      const previewBlock = event.target.closest("[data-preview-block-id]");
      if (previewBlock) {
        event.preventDefault();
        const blockId = previewBlock.dataset.previewBlockId;
        if (!state.extraBlocks.some((block) => block.id === blockId)) return;
        state.activeBlockId = blockId;
        state.activeNoticeIndex = -1;
        renderAddedBlocks();
        render(true);
        updateNoticeSelection();
        scrollActiveBlockIntoView();
        els.status.textContent = "プレビューで選んだ部品を左で編集できます";
        return;
      }

      const link = event.target.closest(".site-nav a");
      if (!link) return;
      event.preventDefault();
      saveCurrentPage();
      const nextIndex = state.pages.findIndex((page, index) => slugForPage(index) === link.getAttribute("href"));
      if (nextIndex < 0) return;
      state.currentPageIndex = nextIndex;
      applyPageData(state.pages[state.currentPageIndex]);
      render();
    });

    els.blockTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-block-category]");
      if (!button) return;
      state.activeBlockCategory = button.dataset.blockCategory;
      renderBlockPicker();
    });

    els.blockPicker.addEventListener("click", (event) => {
      const button = event.target.closest("[data-add-block-type]");
      if (!button) return;
      const block = defaultBlock(button.dataset.addBlockType);
      state.extraBlocks.push(block);
      state.activeBlockId = block.id;
      state.activeNoticeIndex = -1;
      render();
    });

    function activateAddedBlockFromEvent(event) {
      const item = event.target.closest("[data-added-block-id]");
      if (!item) return false;
      if (state.activeBlockId === item.dataset.addedBlockId) return true;
      state.activeBlockId = item.dataset.addedBlockId;
      state.activeNoticeIndex = -1;
      renderAddedBlocks();
      render(true);
      return true;
    }

    els.addedBlocks.addEventListener("focusin", activateAddedBlockFromEvent);

    els.addedBlocks.addEventListener("click", (event) => {
      activateAddedBlockFromEvent(event);
      const moveButton = event.target.closest("[data-move-block]");
      if (moveButton) {
        event.preventDefault();
        event.stopPropagation();
        const [indexText, direction] = moveButton.dataset.moveBlock.split(":");
        const index = Number(indexText);
        const nextIndex = direction === "up" ? index - 1 : index + 1;
        if (nextIndex < 0 || nextIndex >= state.extraBlocks.length) return;
        const [block] = state.extraBlocks.splice(index, 1);
        state.extraBlocks.splice(nextIndex, 0, block);
        render();
        return;
      }
      const button = event.target.closest("[data-remove-block]");
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      const item = button.closest(".added-block-item");
      if (item) item.remove();
      const [removed] = state.extraBlocks.splice(Number(button.dataset.removeBlock), 1);
      if (removed?.id === state.activeBlockId) {
        state.activeBlockId = state.extraBlocks[0]?.id || "";
      }
      renderAddedBlocks();
      render(true);
    });

    els.addedBlocks.addEventListener("input", (event) => {
      const input = event.target.closest("[data-block-field]");
      if (!input) return;
      event.stopPropagation();
      const [indexText, path] = input.dataset.blockField.split(":");
      const block = state.extraBlocks[Number(indexText)];
      if (!block) return;
      state.activeBlockId = block.id;
      state.activeNoticeIndex = -1;
      if (["heading", "text", "width", "textLinkText", "textLinkUrl", "photoLinkUrl"].includes(path)) {
        block[path] = input.value;
      } else if (path.startsWith("links.")) {
        const [, linkIndexText, key] = path.split(".");
        const link = block.links[Number(linkIndexText)];
        if (link) link[key] = input.value;
      }
      if (input.tagName === "TEXTAREA") autoResizeBlockTextareas();
      render(true);
    });

    optionalEls.noticeBoxes.forEach((box, index) => {
      box.addEventListener("focusin", () => {
        state.activeBlockId = "";
        state.activeNoticeIndex = index;
        renderAddedBlocks();
        render(true);
      });
      box.addEventListener("click", () => {
        state.activeBlockId = "";
        state.activeNoticeIndex = index;
        renderAddedBlocks();
        render(true);
      });
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        state.activeTab = tab.dataset.codeTab;
        document.querySelectorAll(".tab").forEach((item) => item.classList.toggle("active", item === tab));
        render();
      });
    });

    document.querySelectorAll("input, textarea, select").forEach((input) => {
      input.addEventListener("input", render);
    });

    initializeTemplates();
    initializeThemes();
    applyHeadingStyle(state.headingStyle);
    initializePages();
    renderPhotoLibrary();
    render();
  </script>
</body>
</html>
